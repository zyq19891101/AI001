        }
        .toolbar {

            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .lang-switch, .platform-switch {

            gap: 8px;
            background: #1e293b;
            padding: 4px;
            border-radius: 40px;
        }
        .lang-btn, .platform-btn {
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            color: #94a3b8;
            background: transparent;
            border: none;
        }
        .lang-btn.active, .platform-btn.active {
            background: #3b82f6;
            color: white;
        }
        .export-import {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        .icon-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        .builder-body {
            padding: 32px;
            background: #111827;
            max-height: 70vh;
            overflow-y: auto;
        }
        .template-library {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;

        }
        .template-buttons {

            flex-wrap: wrap;

            margin-bottom: 10px;
        }
        .template-btn {
            background: #0f172a;
            color: #e2e8f0;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #334155;
        }
        .batch-tools {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .shots-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 30px;
        }
        .shot-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #3b82f6;
        }
        .shot-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            align-items: center;
        }
        .shot-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;

            color: #e2e8f0;

            border-radius: 30px;
            cursor: pointer;
            margin-left: 8px;

            color: #e2e8f0;
            padding: 4px 8px;
            border-radius: 30px;
            cursor: pointer;
            margin: 0 2px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

        }
        .option-group {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #334155;
        }
        .option-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 6px;

            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            color: #f1f5f9;
            outline: none;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .checkbox-group label {

            align-items: center;
            gap: 6px;
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: normal;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid #334155;
        }

            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

            width: 100px;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            -webkit-appearance: none;
        }
        .weight-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
        }
        .weight-control span {
            color: #94a3b8;
            font-size: 0.85rem;
            min-width: 35px;
        }
        .custom-input {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #334155;
        }
        .custom-input input {
            border-color: #3b82f6;
        }

            background: #1e293b;
            border: 2px dashed #3b82f6;
            color: #3b82f6;
            padding: 16px;
            border-radius: 20px;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 20px 0;
        }

            background: #0f172a;
            border: 2px solid #3b82f6;
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
        }

            width: 100%;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-family: monospace;
            resize: vertical;
            min-height: 150px;
            outline: none;

            justify-content: flex-end;
            flex-wrap: wrap;

            background: #3b82f6;
            color: white;
            border: none;
        }
        .btn-secondary {
            background: #1e293b;
            border: 2px solid #3b82f6;
            color: #3b82f6;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background: #0f172a;
            color: #64748b;
            border-top: 1px solid #334155;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid #3b82f6;
            transform: translateY(100px);
            transition: 0.3s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateY(0);
        }

            background: #3b82f6;
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            margin-left: 8px;

        }

        }
        .toggle-link {

            cursor: pointer;
            font-size: 0.9rem;

            width: 200px;
            background-color: #1e293b;
            color: #e2e8f0;
            text-align: center;
            padding: 5px;
            border-radius: 6px;
            border: 1px solid #3b82f6;

            left: 50%;

            // 防抖更新预览
            function debouncedUpdatePreview() {
                if (updateTimeout) clearTimeout(updateTimeout);
                updateTimeout = setTimeout(() => {
                    updatePreview();
                    updateTimeout = null;
                }, 200);
            }

            // 更新所有下拉的语言（动态切换，不刷新）
            function updateAllLang() {
                document.querySelectorAll('.shot-card').forEach(card => {
                    // 更新复选框文本
                    card.querySelectorAll('.shot-action-group label').forEach(label => {
                        const cb = label.querySelector('input');
                        const val = cb.value;
                        const item = optionData.action.find(i => i.value === val);
                        if (item) label.childNodes[1].nodeValue = currentLang === 'zh' ? item.zh : item.en;
                    });
                    card.querySelectorAll('.shot-negative-group label').forEach(label => {
                        const cb = label.querySelector('input');
                        const val = cb.value;
                        const item = optionData.negative.find(i => i.value === val);
                        if (item) label.childNodes[1].nodeValue = currentLang === 'zh' ? item.zh : item.en;
                    });

                    // 更新select选项
                    ['emotion', 'style', 'effect', 'physics', 'camera', 'lighting', 'interaction', 'position'].forEach(type => {
                        const select = card.querySelector(`.shot-${type}`);
                        if (select) {
                            Array.from(select.options).forEach(opt => {
                                if (opt.value) {
                                    const zh = opt.getAttribute('data-zh');
                                    const en = opt.getAttribute('data-en');
                                    opt.textContent = currentLang === 'zh' ? zh : en;
                                }
                            });
                        }
                    });
                });
            }

                // 互动（带权重）
                const interactionGroup = document.createElement('div');
                interactionGroup.className = 'option-group';
                interactionGroup.innerHTML = `
                    <label>🌳 互动 <span class="badge tooltip">?<span class="tooltiptext">与背景的交互</span></span></label>
                    <select class="shot-interaction"><option value="">-- 请选择 --</option></select>
                    <div class="weight-control">
                        <input type="range" class="shot-interaction-weight" min="0.5" max="2" step="0.1" value="${shotData.interactionWeight || 1}">
                        <span class="weight-value">${shotData.interactionWeight || 1}</span>
                    </div>
                    <div class="custom-input"><input type="text" class="shot-interaction-custom" value="${shotData.interactionCustom || ''}" placeholder="自定义互动"></div>
                `;
                card.appendChild(interactionGroup);
                const interactionSelect = interactionGroup.querySelector('.shot-interaction');
                optionData.interaction.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.interaction) opt.selected = true;
                    interactionSelect.appendChild(opt);
                });
                const interactionWeightSlider = interactionGroup.querySelector('.shot-interaction-weight');
                const interactionWeightSpan = interactionGroup.querySelector('.weight-value');
                interactionWeightSlider.addEventListener('input', () => {
                    interactionWeightSpan.textContent = interactionWeightSlider.value;
                    debouncedUpdatePreview();
                    saveToLocalStorage();
                });

                // 负面词（带权重）
                const negativeGroup = document.createElement('div');
                negativeGroup.className = 'option-group';
                negativeGroup.innerHTML = `
                    <label>⚠️ 负面词 <span class="badge tooltip">?<span class="tooltiptext">要避免的内容，可多选</span></span></label>
                    <div class="checkbox-group shot-negative-group"></div>
                    <div class="weight-control">
                        <input type="range" class="shot-negative-weight" min="0.5" max="2" step="0.1" value="${shotData.negativeWeight || 1}">
                        <span class="weight-value">${shotData.negativeWeight || 1}</span>
                    </div>
                    <div class="custom-input"><input type="text" class="shot-negative-custom" value="${shotData.negativeCustom || ''}" placeholder="自定义负面词"></div>
                `;
                card.appendChild(negativeGroup);
                const negativeContainer = negativeGroup.querySelector('.checkbox-group');
                optionData.negative.forEach(item => {
                    const label = document.createElement('label');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.className = 'shot-negative-cb';
                    cb.value = item.value;
                    if (shotData.negative && shotData.negative.includes(item.value)) cb.checked = true;
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(currentLang === 'zh' ? item.zh : item.en));
                    negativeContainer.appendChild(label);
                });
                const negativeWeightSlider = negativeGroup.querySelector('.shot-negative-weight');
                const negativeWeightSpan = negativeGroup.querySelector('.weight-value');
                negativeWeightSlider.addEventListener('input', () => {
                    negativeWeightSpan.textContent = negativeWeightSlider.value;
                    debouncedUpdatePreview();
                    saveToLocalStorage();
                });

                return card;
            }

            // 收集镜头数据（带权重）
            function collectShotData(card) {
                return {
                    subject: card.querySelector('.shot-subject').value,
                    action: Array.from(card.querySelectorAll('.shot-action-cb:checked')).map(cb => cb.value),
                    actionCustom: card.querySelector('.shot-action-custom').value,
                    actionWeight: parseFloat(card.querySelector('.shot-action-weight').value),
                    emotion: card.querySelector('.shot-emotion').value,
                    emotionCustom: card.querySelector('.shot-emotion-custom').value,
                    emotionWeight: parseFloat(card.querySelector('.shot-emotion-weight').value),
                    style: card.querySelector('.shot-style').value,
                    styleCustom: card.querySelector('.shot-style-custom').value,
                    styleWeight: parseFloat(card.querySelector('.shot-style-weight').value),
                    camera: card.querySelector('.shot-camera').value,
                    cameraCustom: card.querySelector('.shot-camera-custom').value,
                    cameraWeight: parseFloat(card.querySelector('.shot-camera-weight').value),
                    position: card.querySelector('.shot-position').value,
                    positionCustom: card.querySelector('.shot-position-custom').value,
                    positionWeight: parseFloat(card.querySelector('.shot-position-weight').value),
                    lighting: card.querySelector('.shot-lighting').value,
                    lightingCustom: card.querySelector('.shot-lighting-custom').value,
                    lightingWeight: parseFloat(card.querySelector('.shot-lighting-weight').value),
                    effect: card.querySelector('.shot-effect').value,
                    effectCustom: card.querySelector('.shot-effect-custom').value,
                    effectWeight: parseFloat(card.querySelector('.shot-effect-weight').value),
                    physics: card.querySelector('.shot-physics').value,
                    physicsCustom: card.querySelector('.shot-physics-custom').value,
                    physicsWeight: parseFloat(card.querySelector('.shot-physics-weight').value),
                    interaction: card.querySelector('.shot-interaction').value,
                    interactionCustom: card.querySelector('.shot-interaction-custom').value,
                    interactionWeight: parseFloat(card.querySelector('.shot-interaction-weight').value),
                    negative: Array.from(card.querySelectorAll('.shot-negative-cb:checked')).map(cb => cb.value),
                    negativeCustom: card.querySelector('.shot-negative-custom').value,
                    negativeWeight: parseFloat(card.querySelector('.shot-negative-weight').value)
                };
            }

            // 生成单个镜头提示词（带权重）
            function generateShotPrompt(shotData) {
                const parts = [];
                if (shotData.subject) parts.push(shotData.subject);

                // 动作
                const actionTexts = shotData.action.map(v => {
                    const item = optionData.action.find(i => i.value === v);
                    return item ? (currentLang === 'zh' ? item.zh : item.en) : '';
                }).filter(t => t);
                if (shotData.actionCustom) actionTexts.push(shotData.actionCustom);
                if (actionTexts.length) {
                    const joined = actionTexts.join('，');
                    if (shotData.actionWeight && shotData.actionWeight !== 1) {
                        parts.push(`(${joined}:${shotData.actionWeight})`);
                    } else {
                        parts.push(joined);
                    }
                }

                // 情绪
                const emotionItem = optionData.emotion.find(i => i.value === shotData.emotion);
                let emotionText = '';
                if (emotionItem) emotionText = currentLang === 'zh' ? emotionItem.zh : emotionItem.en;
                if (shotData.emotionCustom) emotionText = (emotionText ? emotionText + '，' : '') + shotData.emotionCustom;
                if (emotionText) {
                    if (shotData.emotionWeight && shotData.emotionWeight !== 1) {
                        parts.push(`(${emotionText}:${shotData.emotionWeight})`);
                    } else {
                        parts.push(emotionText);
                    }
                }

                // 互动
                const interactionItem = optionData.interaction.find(i => i.value === shotData.interaction);
                let interactionText = '';
                if (interactionItem) interactionText = currentLang === 'zh' ? interactionItem.zh : interactionItem.en;
                if (shotData.interactionCustom) interactionText = (interactionText ? interactionText + '，' : '') + shotData.interactionCustom;
                if (interactionText) {
                    if (shotData.interactionWeight && shotData.interactionWeight !== 1) {
                        parts.push(`(${interactionText}:${shotData.interactionWeight})`);
                    } else {
                        parts.push(interactionText);
                    }
                }

                // 站位
                const positionItem = optionData.position.find(i => i.value === shotData.position);
                let positionText = '';
                if (positionItem) positionText = currentLang === 'zh' ? positionItem.zh : positionItem.en;
                if (shotData.positionCustom) positionText = (positionText ? positionText + '，' : '') + shotData.positionCustom;
                if (positionText) {
                    if (shotData.positionWeight && shotData.positionWeight !== 1) {
                        parts.push(`(${positionText}:${shotData.positionWeight})`);
                    } else {
                        parts.push(positionText);
                    }
                }

                // 运镜
                const cameraItem = optionData.camera.find(i => i.value === shotData.camera);
                let cameraText = '';
                if (cameraItem) cameraText = currentLang === 'zh' ? cameraItem.zh : cameraItem.en;
                if (shotData.cameraCustom) cameraText = (cameraText ? cameraText + '，' : '') + shotData.cameraCustom;
                if (cameraText) {
                    if (shotData.cameraWeight && shotData.cameraWeight !== 1) {
                        parts.push(`(${cameraText}:${shotData.cameraWeight})`);
                    } else {
                        parts.push(cameraText);
                    }
                }

                // 光影
                const lightingItem = optionData.lighting.find(i => i.value === shotData.lighting);
                let lightingText = '';
                if (lightingItem) lightingText = currentLang === 'zh' ? lightingItem.zh : lightingItem.en;
                if (shotData.lightingCustom) lightingText = (lightingText ? lightingText + '，' : '') + shotData.lightingCustom;
                if (lightingText) {
                    if (shotData.lightingWeight && shotData.lightingWeight !== 1) {
                        parts.push(`(${lightingText}:${shotData.lightingWeight})`);
                    } else {
                        parts.push(lightingText);
                    }
                }

                // 风格
                const styleItem = optionData.style.find(i => i.value === shotData.style);
                let styleText = '';
                if (styleItem) styleText = currentLang === 'zh' ? styleItem.zh : styleItem.en;
                if (shotData.styleCustom) styleText = (styleText ? styleText + '，' : '') + shotData.styleCustom;
                if (styleText) {
                    if (shotData.styleWeight && shotData.styleWeight !== 1) {
                        parts.push(`(${styleText}:${shotData.styleWeight})`);
                    } else {
                        parts.push(styleText);
                    }
                }

                // 特效
                const effectItem = optionData.effect.find(i => i.value === shotData.effect);
                let effectText = '';
                if (effectItem) effectText = currentLang === 'zh' ? effectItem.zh : effectItem.en;
                if (shotData.effectCustom) effectText = (effectText ? effectText + '，' : '') + shotData.effectCustom;
                if (effectText) {
                    if (shotData.effectWeight && shotData.effectWeight !== 1) {
                        parts.push(`(${effectText}:${shotData.effectWeight})`);
                    } else {
                        parts.push(effectText);
                    }
                }

                // 物理
                const physicsItem = optionData.physics.find(i => i.value === shotData.physics);
                let physicsText = '';
                if (physicsItem) physicsText = currentLang === 'zh' ? physicsItem.zh : physicsItem.en;
                if (shotData.physicsCustom) physicsText = (physicsText ? physicsText + '，' : '') + shotData.physicsCustom;
                if (physicsText) {
                    if (shotData.physicsWeight && shotData.physicsWeight !== 1) {
                        parts.push(`(${physicsText}:${shotData.physicsWeight})`);
                    } else {
                        parts.push(physicsText);
                    }
                }

                let prompt = parts.join('，');

                // 负面（平台适配，权重暂不加到负面）
                const negativeTexts = [];
                shotData.negative.forEach(v => {
                    const item = optionData.negative.find(i => i.value === v);
                    if (item) negativeTexts.push(currentLang === 'zh' ? item.zh : item.en);
                });
                if (shotData.negativeCustom) negativeTexts.push(shotData.negativeCustom);
                if (negativeTexts.length) {
                    if (currentPlatform === 'midjourney') {
                        prompt += ' --no ' + negativeTexts.join(', ');
                    } else if (currentPlatform === 'stable diffusion') {
                        prompt += ' negative prompt: ' + negativeTexts.join('，');
                    } else {
                        prompt += '，避免' + negativeTexts.join('，');
                    }
                }

                return prompt;
            }

            // 更新总预览
            function updatePreview() {
                const shots = collectAllShots();
                if (shots.length === 0) {
                    previewTextarea.value = '';
                    return;
                }
                const shotPrompts = shots.map((shot, index) => `【镜头 ${index+1}】${generateShotPrompt(shot)}`);
                previewTextarea.value = shotPrompts.join('\n\n');
            }

            function collectAllShots() {
                return Array.from(document.querySelectorAll('.shot-card')).map(card => collectShotData(card));
            }

            // 保存配置到localStorage
            function saveToLocalStorage() {
                const shots = collectAllShots();
                localStorage.setItem('directorFull', JSON.stringify(shots));
                // 不弹toast，避免频繁提示
            }

            // 加载配置
            function loadFromLocalStorage() {
                const saved = localStorage.getItem('directorFull');
                if (!saved) { showToast('无保存配置'); return; }
                try {
                    const shots = JSON.parse(saved);
                    shotsContainer.innerHTML = '';
                    shotCounter = 0;
                    shots.forEach(data => {
                        const newId = ++shotCounter;
                        const card = createShotCard(newId, data, false);
                        shotsContainer.appendChild(card);
                        bindShotEvents(card);
                    });
                    updatePreview();
                    showToast('配置已加载');
                } catch { showToast('加载失败'); }
            }

            // 清空所有
            function clearAll() {
                shotsContainer.innerHTML = '';
                shotCounter = 0;
                const newId = ++shotCounter;
                const card = createShotCard(newId, {}, false);
                shotsContainer.appendChild(card);
                bindShotEvents(card);
                updatePreview();
                saveToLocalStorage();
            }

            // 绑定镜头事件（包括折叠、移动、复制、删除等）
            function bindShotEvents(card) {
                // 所有输入变化实时更新预览并保存
                card.querySelectorAll('input, select, textarea').forEach(el => {
                    el.addEventListener('input', debouncedUpdatePreview);
                    el.addEventListener('change', debouncedUpdatePreview);
                });
                // 额外监听滑块变化（已单独加过，但为保险再加）
                card.querySelectorAll('input[type=range]').forEach(slider => {
                    slider.addEventListener('input', debouncedUpdatePreview);
                });

                // 复制镜头
                card.querySelector('.copy-shot-btn').addEventListener('click', () => {
                    const data = collectShotData(card);
                    const newId = ++shotCounter;
                    const newCard = createShotCard(newId, data, card.classList.contains('expanded'));
                    shotsContainer.appendChild(newCard);
                    bindShotEvents(newCard);
                    updatePreview();
                    saveToLocalStorage();
                });

                // 删除镜头
                card.querySelector('.delete-shot-btn').addEventListener('click', () => {
                    if (document.querySelectorAll('.shot-card').length <= 1) {
                        alert('至少保留一个镜头');
                        return;
                    }
                    card.remove();
                    updatePreview();
                    saveToLocalStorage();
                });

                // 折叠/展开
                const toggleBtn = card.querySelector('.toggle-collapse-btn');
                toggleBtn.addEventListener('click', () => {
                    card.classList.toggle('expanded');
                    toggleBtn.textContent = card.classList.contains('expanded') ? '🔼 折叠' : '🔽 展开';
                });

                // 上移/下移
                const upBtn = card.querySelector('.move-up-btn');
                const downBtn = card.querySelector('.move-down-btn');
                upBtn.addEventListener('click', () => {
                    const prev = card.previousElementSibling;
                    if (prev) {
                        shotsContainer.insertBefore(card, prev);
                        updatePreview();
                        saveToLocalStorage();
                    }
                });
                downBtn.addEventListener('click', () => {
                    const next = card.nextElementSibling;
                    if (next) {
                        shotsContainer.insertBefore(next, card);
                        updatePreview();
                        saveToLocalStorage();
                    }
                });
            }

            // 语言切换（动态更新）
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLang = btn.dataset.lang;
                    updateAllLang();
                    updatePreview();
                });
            });

            // 平台切换
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentPlatform = btn.dataset.platform;
                    updatePreview();
                });
            });

            // 多镜头模板应用
            document.querySelectorAll('.template-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tmpl = multiShotTemplates[btn.dataset.template];
                    if (!tmpl) return;
                    shotsContainer.innerHTML = '';
                    shotCounter = 0;
                    tmpl.forEach(shotData => {
                        const newId = ++shotCounter;
                        // 确保权重默认1
                        shotData.actionWeight = shotData.actionWeight || 1;
                        shotData.emotionWeight = shotData.emotionWeight || 1;
                        shotData.styleWeight = shotData.styleWeight || 1;
                        shotData.cameraWeight = shotData.cameraWeight || 1;
                        shotData.positionWeight = shotData.positionWeight || 1;
                        shotData.lightingWeight = shotData.lightingWeight || 1;
                        shotData.effectWeight = shotData.effectWeight || 1;
                        shotData.physicsWeight = shotData.physicsWeight || 1;
                        shotData.interactionWeight = shotData.interactionWeight || 1;
                        shotData.negativeWeight = shotData.negativeWeight || 1;
                        const card = createShotCard(newId, shotData, false);
                        shotsContainer.appendChild(card);
                        bindShotEvents(card);
                    });
                    updatePreview();
                    saveToLocalStorage();
                });
            });

            // 批量工具：复制当前镜头到所有
            document.getElementById('applyToAllBtn').addEventListener('click', () => {
                const cards = document.querySelectorAll('.shot-card');
                if (cards.length === 0) return;
                const firstData = collectShotData(cards[0]);
                cards.forEach((card, idx) => {
                    if (idx === 0) return;
                    // 更新card的值
                    card.querySelector('.shot-subject').value = firstData.subject;
                    // 动作
                    card.querySelectorAll('.shot-action-cb').forEach(cb => cb.checked = false);
                    firstData.action.forEach(val => {
                        const cb = card.querySelector(`.shot-action-cb[value="${val}"]`);
                        if (cb) cb.checked = true;
                    });
                    card.querySelector('.shot-action-custom').value = firstData.actionCustom;
                    card.querySelector('.shot-action-weight').value = firstData.actionWeight;
                    card.querySelector('.shot-action-weight + .weight-value').textContent = firstData.actionWeight;

                    // 情绪
                    card.querySelector('.shot-emotion').value = firstData.emotion;
                    card.querySelector('.shot-emotion-custom').value = firstData.emotionCustom;
                    card.querySelector('.shot-emotion-weight').value = firstData.emotionWeight;
                    card.querySelector('.shot-emotion-weight + .weight-value').textContent = firstData.emotionWeight;

                    // 风格
                    card.querySelector('.shot-style').value = firstData.style;
                    card.querySelector('.shot-style-custom').value = firstData.styleCustom;
                    card.querySelector('.shot-style-weight').value = firstData.styleWeight;
                    card.querySelector('.shot-style-weight + .weight-value').textContent = firstData.styleWeight;

                    // 运镜
                    card.querySelector('.shot-camera').value = firstData.camera;
                    card.querySelector('.shot-camera-custom').value = firstData.cameraCustom;
                    card.querySelector('.shot-camera-weight').value = firstData.cameraWeight;
                    card.querySelector('.shot-camera-weight + .weight-value').textContent = firstData.cameraWeight;

                    // 站位
                    card.querySelector('.shot-position').value = firstData.position;
                    card.querySelector('.shot-position-custom').value = firstData.positionCustom;
                    card.querySelector('.shot-position-weight').value = firstData.positionWeight;
                    card.querySelector('.shot-position-weight + .weight-value').textContent = firstData.positionWeight;

                    // 光影
                    card.querySelector('.shot-lighting').value = firstData.lighting;
                    card.querySelector('.shot-lighting-custom').value = firstData.lightingCustom;
                    card.querySelector('.shot-lighting-weight').value = firstData.lightingWeight;
                    card.querySelector('.shot-lighting-weight + .weight-value').textContent = firstData.lightingWeight;

                    // 特效
                    card.querySelector('.shot-effect').value = firstData.effect;
                    card.querySelector('.shot-effect-custom').value = firstData.effectCustom;
                    card.querySelector('.shot-effect-weight').value = firstData.effectWeight;
                    card.querySelector('.shot-effect-weight + .weight-value').textContent = firstData.effectWeight;

                    // 物理
                    card.querySelector('.shot-physics').value = firstData.physics;
                    card.querySelector('.shot-physics-custom').value = firstData.physicsCustom;
                    card.querySelector('.shot-physics-weight').value = firstData.physicsWeight;
                    card.querySelector('.shot-physics-weight + .weight-value').textContent = firstData.physicsWeight;

                    // 互动
                    card.querySelector('.shot-interaction').value = firstData.interaction;
                    card.querySelector('.shot-interaction-custom').value = firstData.interactionCustom;
                    card.querySelector('.shot-interaction-weight').value = firstData.interactionWeight;
                    card.querySelector('.shot-interaction-weight + .weight-value').textContent = firstData.interactionWeight;

                    // 负面
                    card.querySelectorAll('.shot-negative-cb').forEach(cb => cb.checked = false);
                    firstData.negative.forEach(val => {
                        const cb = card.querySelector(`.shot-negative-cb[value="${val}"]`);
                        if (cb) cb.checked = true;
                    });
                    card.querySelector('.shot-negative-custom').value = firstData.negativeCustom;
                    card.querySelector('.shot-negative-weight').value = firstData.negativeWeight;
                    card.querySelector('.shot-negative-weight + .weight-value').textContent = firstData.negativeWeight;
                });
                updatePreview();
                saveToLocalStorage();
                showToast('已应用到所有镜头');
            });

            // 折叠/展开所有
            document.getElementById('collapseAllBtn').addEventListener('click', () => {
                document.querySelectorAll('.shot-card').forEach(card => {
                    card.classList.remove('expanded');
                    const btn = card.querySelector('.toggle-collapse-btn');
                    if (btn) btn.textContent = '🔽 展开';
                });
            });
            document.getElementById('expandAllBtn').addEventListener('click', () => {
                document.querySelectorAll('.shot-card').forEach(card => {
                    card.classList.add('expanded');
                    const btn = card.querySelector('.toggle-collapse-btn');
                    if (btn) btn.textContent = '🔼 折叠';
                });
            });

            // 导出配置
            document.getElementById('exportConfigBtn').addEventListener('click', () => {
                const shots = collectAllShots();
                const dataStr = JSON.stringify(shots, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `prompt_config_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('配置已导出');
            });

            // 导入配置
            document.getElementById('importConfigBtn').addEventListener('click', () => {
                document.getElementById('importFile').click();
            });
            document.getElementById('importFile').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const shots = JSON.parse(ev.target.result);
                        shotsContainer.innerHTML = '';
                        shotCounter = 0;
                        shots.forEach(data => {
                            const newId = ++shotCounter;
                            const card = createShotCard(newId, data, false);
                            shotsContainer.appendChild(card);
                            bindShotEvents(card);
                        });
                        updatePreview();
                        saveToLocalStorage();
                        showToast('配置已导入');
                    } catch {
                        showToast('文件格式错误');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            });

            // 添加镜头按钮
            document.getElementById('addShotBtn').addEventListener('click', () => {
                const newId = ++shotCounter;
                const card = createShotCard(newId, {}, false);
                shotsContainer.appendChild(card);
                bindShotEvents(card);
                updatePreview();
                saveToLocalStorage();
            });

            // 保存/加载/清空/复制
            document.getElementById('saveConfigBtn').addEventListener('click', saveToLocalStorage);
            document.getElementById('loadConfigBtn').addEventListener('click', loadFromLocalStorage);
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('copyBtn').addEventListener('click', async () => {
                const text = previewTextarea.value;
                if (!text.trim()) { alert('无内容可复制'); return; }
                await navigator.clipboard.writeText(text);
                showToast('✅ 已复制');
            });

            // 初始化
            (function init() {
                const saved = localStorage.getItem('directorFull');
                if (saved) {
                    try {
                        const shots = JSON.parse(saved);
                        shotsContainer.innerHTML = '';
                        shotCounter = 0;
                        shots.forEach(data => {
                            const newId = ++shotCounter;
                            const card = createShotCard(newId, data, false);
                            shotsContainer.appendChild(card);
                            bindShotEvents(card);
                        });
                        updatePreview();
                    } catch {
                        // 默认新建
                        clearAll();
                    }
                } else {
                    clearAll();
                }
            })();
        })();
    </script>
</body>
</html>
