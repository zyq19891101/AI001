<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        /* 极简样式，保留核心功能 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0f1a;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: #151e2c;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2a3442;
        }
        .header {
            background: #0e1623;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 500;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .lang-switch, .platform-switch {
            display: flex;
            gap: 4px;
            background: #1f2a38;
            padding: 4px;
            border-radius: 30px;
        }
        .lang-btn, .platform-btn {
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: #a0b3cc;
            background: transparent;
            border: none;
            font-size: 0.85rem;
        }
        .lang-btn.active, .platform-btn.active {
            background: #3b82f6;
            color: white;
        }
        .icon-btn {
            background: #1f2a38;
            border: none;
            color: #cbd5e0;
            padding: 4px 10px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .builder-body {
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
            background: #111a26;
        }
        .template-library {
            background: #1f2a38;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .template-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .template-btn {
            background: #0e1623;
            color: #e2e8f0;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid #334155;
            font-size: 0.85rem;
        }
        .shots-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }
        .shot-card {
            background: #1f2a38;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #3b82f6;
        }
        .shot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .shot-title {
            font-size: 1rem;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .move-buttons button {
            background: #0e1623;
            border: none;
            color: #a0b3cc;
            padding: 2px 6px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .shot-actions button {
            background: #0e1623;
            border: none;
            color: #a0b3cc;
            padding: 4px 8px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 4px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }
        .option-group {
            background: #0e1623;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #2a3442;
        }
        .option-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #b0c4de;
            font-size: 0.85rem;
        }
        .option-group select, .option-group input, .option-group textarea {
            width: 100%;
            padding: 6px 8px;
            background: #1f2a38;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.85rem;
            outline: none;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            max-height: 80px;
            overflow-y: auto;
            padding: 2px;
        }
        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: #1f2a38;
            padding: 3px 8px;
            border-radius: 16px;
            font-weight: normal;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid #334155;
            margin: 0;
        }
        .weight-control {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        .weight-control input[type="range"] {
            width: 80px;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            -webkit-appearance: none;
        }
        .weight-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
        }
        .weight-control span {
            color: #94a3b8;
            font-size: 0.75rem;
            min-width: 30px;
        }
        .custom-input {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #334155;
        }
        .custom-input input {
            font-size: 0.8rem;
            padding: 4px 6px;
        }
        .add-shot-btn {
            background: #1f2a38;
            border: 1px dashed #3b82f6;
            color: #3b82f6;
            padding: 10px;
            border-radius: 16px;
            width: 100%;
            font-size: 0.9rem;
            cursor: pointer;
            margin: 10px 0;
        }
        .preview-area {
            background: #0e1623;
            border: 1px solid #3b82f6;
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0;
        }
        .preview-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-family: monospace;
            resize: vertical;
            min-height: 100px;
            font-size: 0.85rem;
            outline: none;
        }
        .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            border: none;
            font-size: 0.85rem;
        }
        .btn-secondary {
            background: #1f2a38;
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }
        .footer {
            text-align: center;
            padding: 12px;
            background: #0e1623;
            color: #64748b;
            font-size: 0.8rem;
            border-top: 1px solid #2a3442;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f2a38;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #3b82f6;
            transform: translateY(100px);
            transition: 0.3s;
            font-size: 0.85rem;
            z-index: 1000;
        }
        .toast.show {
            transform: translateY(0);
        }

</head>

                }

                // 物理
                const physicsItem = optionData.physics.find(i => i.value === shotData.physics);
                let physicsText = '';
                if (physicsItem) physicsText = currentLang === 'zh' ? physicsItem.zh : physicsItem.en;
                if (shotData.physicsCustom) physicsText = (physicsText ? physicsText + '，' : '') + shotData.physicsCustom;
                if (physicsText) {
                    const prefix = currentLang === 'zh' ? '物理：' : 'Physics: ';
                    if (shotData.physicsWeight && shotData.physicsWeight !== 1) {
                        parts.push(`${prefix}(${physicsText}:${shotData.physicsWeight})`);
                    } else {
                        parts.push(prefix + physicsText);
                    }
                }

                // 互动
                const interactionItem = optionData.interaction.find(i => i.value === shotData.interaction);
                let interactionText = '';
                if (interactionItem) interactionText = currentLang === 'zh' ? interactionItem.zh : interactionItem.en;
                if (shotData.interactionCustom) interactionText = (interactionText ? interactionText + '，' : '') + shotData.interactionCustom;
                if (interactionText) {
                    const prefix = currentLang === 'zh' ? '互动：' : 'Interaction: ';
                    if (shotData.interactionWeight && shotData.interactionWeight !== 1) {
                        parts.push(`${prefix}(${interactionText}:${shotData.interactionWeight})`);
                    } else {
                        parts.push(prefix + interactionText);
                    }
                }

                let prompt = parts.join('，');

                // 负面
                const negativeTexts = [];
                shotData.negative.forEach(v => {
                    const item = optionData.negative.find(i => i.value === v);
                    if (item) negativeTexts.push(currentLang === 'zh' ? item.zh : item.en);
                });
                if (shotData.negativeCustom) negativeTexts.push(shotData.negativeCustom);
                if (negativeTexts.length) {
                    if (currentPlatform === 'midjourney') {
                        prompt += ' --no ' + negativeTexts.join(', ');
                    } else if (currentPlatform === 'stable diffusion') {
                        prompt += ' negative prompt: ' + negativeTexts.join('，');
                    } else {
                        prompt += '，避免' + negativeTexts.join('，');
                    }
                }

                return prompt;
            }

            function updatePreview() {
                const shots = collectAllShots();
                if (shots.length === 0) {
                    previewTextarea.value = '';
                    return;
                }
                const shotPrompts = shots.map((shot, index) => `【镜头 ${index+1}】${generateShotPrompt(shot)}`);
                previewTextarea.value = shotPrompts.join('\n\n');
            }

            function saveToLocalStorage() {
                const shots = collectAllShots();
                localStorage.setItem('promptBuilderSimple', JSON.stringify(shots));
            }

            function loadFromLocalStorage() {
                const saved = localStorage.getItem('promptBuilderSimple');
                if (!saved) { showToast('无保存配置'); return; }
                try {
                    const shots = JSON.parse(saved);
                    shotsContainer.innerHTML = '';
                    shotCounter = 0;
                    shots.forEach(data => {
                        const newId = ++shotCounter;
                        const card = createShotCard(newId, data);
                        shotsContainer.appendChild(card);
                        bindShotEvents(card);
                    });
                    updatePreview();
                    showToast('配置已加载');
                } catch { showToast('加载失败'); }
            }

            function clearAll() {
                shotsContainer.innerHTML = '';
                shotCounter = 0;
                const newId = ++shotCounter;
                const card = createShotCard(newId, {});
                shotsContainer.appendChild(card);
                bindShotEvents(card);
                updatePreview();
                saveToLocalStorage();
            }

            // 绑定镜头事件
            function bindShotEvents(card) {
                card.querySelectorAll('input, select, textarea').forEach(el => {
                    el.addEventListener('input', debouncedUpdatePreview);
                    el.addEventListener('change', debouncedUpdatePreview);
                });

                card.querySelector('.copy-shot-btn').addEventListener('click', () => {
                    const data = collectShotData(card);
                    const newId = ++shotCounter;
                    const newCard = createShotCard(newId, data);
                    shotsContainer.appendChild(newCard);
                    bindShotEvents(newCard);
                    updatePreview();
                    saveToLocalStorage();
                });

                card.querySelector('.delete-shot-btn').addEventListener('click', () => {
                    if (document.querySelectorAll('.shot-card').length <= 1) {
                        alert('至少保留一个镜头');
                        return;
                    }
                    card.remove();
                    updatePreview();
                    saveToLocalStorage();
                });

                const upBtn = card.querySelector('.move-up-btn');
                const downBtn = card.querySelector('.move-down-btn');
                upBtn.addEventListener('click', () => {
                    const prev = card.previousElementSibling;
                    if (prev) {
                        shotsContainer.insertBefore(card, prev);
                        updatePreview();
                        saveToLocalStorage();
                    }
                });
                downBtn.addEventListener('click', () => {
                    const next = card.nextElementSibling;
                    if (next) {
                        shotsContainer.insertBefore(next, card);
                        updatePreview();
                        saveToLocalStorage();
                    }
                });
            }

            // 语言切换
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLang = btn.dataset.lang;
                    updateAllLang();
                    updatePreview();
                });
            });

            // 平台切换
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentPlatform = btn.dataset.platform;
                    updatePreview();
                });
            });

            // 模板应用
            document.querySelectorAll('.template-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tmpl = multiShotTemplates[btn.dataset.template];
                    if (!tmpl) return;
                    shotsContainer.innerHTML = '';
                    shotCounter = 0;
                    tmpl.forEach(shotData => {
                        const newId = ++shotCounter;
                        // 确保权重默认1
                        shotData.actionWeight = shotData.actionWeight || 1;
                        shotData.emotionWeight = shotData.emotionWeight || 1;
                        shotData.styleWeight = shotData.styleWeight || 1;
                        shotData.cameraWeight = shotData.cameraWeight || 1;
                        shotData.positionWeight = shotData.positionWeight || 1;
                        shotData.lightingWeight = shotData.lightingWeight || 1;
                        shotData.effectWeight = shotData.effectWeight || 1;
                        shotData.physicsWeight = shotData.physicsWeight || 1;
                        shotData.interactionWeight = shotData.interactionWeight || 1;
                        shotData.negativeWeight = shotData.negativeWeight || 1;
                        const card = createShotCard(newId, shotData);
                        shotsContainer.appendChild(card);
                        bindShotEvents(card);
                    });
                    updatePreview();
                    saveToLocalStorage();
                });
            });

            // 导出配置
            document.getElementById('exportConfigBtn').addEventListener('click', () => {
                const shots = collectAllShots();
                const dataStr = JSON.stringify(shots, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `prompt_config_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('配置已导出');
            });

            // 导入配置
            document.getElementById('importConfigBtn').addEventListener('click', () => {
                document.getElementById('importFile').click();
            });
            document.getElementById('importFile').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const shots = JSON.parse(ev.target.result);
                        shotsContainer.innerHTML = '';
                        shotCounter = 0;
                        shots.forEach(data => {
                            const newId = ++shotCounter;
                            const card = createShotCard(newId, data);
                            shotsContainer.appendChild(card);
                            bindShotEvents(card);
                        });
                        updatePreview();
                        saveToLocalStorage();
                        showToast('配置已导入');
                    } catch {
                        showToast('文件格式错误');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            });

            // 添加镜头按钮
            document.getElementById('addShotBtn').addEventListener('click', () => {
                const newId = ++shotCounter;
                const card = createShotCard(newId, {});
                shotsContainer.appendChild(card);
                bindShotEvents(card);
                updatePreview();
                saveToLocalStorage();
            });

            // 保存/加载/清空/复制
            document.getElementById('saveConfigBtn').addEventListener('click', saveToLocalStorage);
            document.getElementById('loadConfigBtn').addEventListener('click', loadFromLocalStorage);
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('copyBtn').addEventListener('click', async () => {
                const text = previewTextarea.value;
                if (!text.trim()) { alert('无内容可复制'); return; }
                await navigator.clipboard.writeText(text);
                showToast('✅ 已复制');
            });

            // 初始化
            (function init() {
                const saved = localStorage.getItem('promptBuilderSimple');
                if (saved) {
                    try {
                        const shots = JSON.parse(saved);
                        shotsContainer.innerHTML = '';
                        shotCounter = 0;
                        shots.forEach(data => {
                            const newId = ++shotCounter;
                            const card = createShotCard(newId, data);
                            shotsContainer.appendChild(card);
                            bindShotEvents(card);
                        });
                        updatePreview();
                    } catch {
                        clearAll();
                    }
                } else {
                    clearAll();
                }
            })();
        })();
    </script>
</body>
</html>
