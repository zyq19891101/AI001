<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <style>
        /* 样式与上一轮完全一致，为节省篇幅此处省略，实际使用时保留完整样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0b1120;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: #1a2332;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #334155;
        }
        .header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 24px 32px;
            border-bottom: 1px solid #334155;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header h1 span {
            background: #3b82f6;
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 40px;
            margin-left: 16px;
        }
        .header p {
            color: #94a3b8;
            font-size: 1rem;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 20px;
        }
        .lang-switch, .platform-switch {
            display: flex;
            gap: 12px;
            background: #1e293b;
            padding: 4px;
            border-radius: 40px;
            border: 1px solid #334155;
        }
        .lang-btn, .platform-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .lang-btn.active, .platform-btn.active {
            background: #3b82f6;
            color: white;
        }
        .builder-body {
            padding: 32px;
            background: #111827;
            max-height: 70vh;
            overflow-y: auto;
        }
        .template-library {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }
        .template-library h3 {
            color: #e2e8f0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .template-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .template-btn {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .template-btn:hover {
            background: #2d3a4f;
            border-color: #3b82f6;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .option-group {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .option-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e2e8f0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-group select, .option-group input, .option-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #334155;
            border-radius: 16px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            background: #0f172a;
            color: #f1f5f9;
        }
        .option-group select:focus, .option-group input:focus, .option-group textarea:focus {
            border-color: #3b82f6;
        }
        .option-group select[multiple] {
            height: 160px;
            padding: 8px;
        }
        .option-group select[multiple] option {
            padding: 8px 12px;
            border-radius: 8px;
            margin: 2px 0;
            background: #1e293b;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            margin-bottom: 8px;
        }
        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0f172a;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #334155;
            font-weight: normal;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 4px;
        }
        .custom-input {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #334155;
        }
        .custom-input input {
            background: #0f172a;
            border: 2px solid #3b82f6;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 0.9rem;
            color: #f1f5f9;
            width: 100%;
        }
        .custom-input input::placeholder {
            color: #64748b;
            font-style: italic;
        }
        .preview-area {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 20px;
            padding: 24px;
            margin: 30px 0 20px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 150px;
            border: 2px solid #3b82f6;
        }
        .preview-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            resize: vertical;
            outline: none;
            min-height: 120px;
        }
        .actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 8px 16px rgba(59,130,246,0.3);
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #1e293b;
            border: 2px solid #3b82f6;
            color: #3b82f6;
        }
        .btn-secondary:hover {
            background: #2d3a4f;
        }
        .footer {
            text-align: center;
            padding: 24px 32px;
            background: #0f172a;
            color: #64748b;
            font-size: 0.9rem;
            border-top: 1px solid #334155;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transform: translateY(100px);
            transition: transform 0.3s;
            z-index: 1000;
            border: 1px solid #3b82f6;
        }
        .toast.show {
            transform: translateY(0);
        }
        .badge {
            background: #3b82f6;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 30px;
            margin-left: 8px;
        }
        @media (max-width: 600px) {
            .checkbox-group label {
                flex: 1 1 auto;
                justify-content: center;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .lang-switch, .platform-switch {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 AI短剧提示词构建器 · 终极版 <span>v4.0</span></h1>
            <p>模板库 · 实时预览 · 智能推荐 · 平台适配 · 持久化 · 自定义变量</p>
            <div class="toolbar">
                <div class="lang-switch">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">English</button>
                </div>
                <div class="platform-switch">
                    <button class="platform-btn active" data-platform="通用">🎯 通用</button>
                    <button class="platform-btn" data-platform="midjourney">🎨 Midjourney</button>
                    <button class="platform-btn" data-platform="stable diffusion">⚡ Stable Diffusion</button>
                </div>
            </div>
        </div>

        <div class="builder-body">
            <div class="template-library">
                <h3>📚 场景模板库 <span class="badge">一键填充</span></h3>

                    <button class="template-btn" data-template="ancient_fight">⚔️ 古风打斗</button>
                    <button class="template-btn" data-template="urban_love">💔 都市虐恋</button>
                    <button class="template-btn" data-template="scifi_awakening">🤖 科幻觉醒</button>
                    <button class="template-btn" data-template="fantasy_magic">🧙 奇幻魔法</button>
                    <button class="template-btn" data-template="horror_escape">👻 恐怖逃亡</button>
                    <button class="template-btn" data-template="comedy_slapstick">😂 喜剧夸张</button>
                    <button class="template-btn" data-template="historical_epic">🏯 历史史诗</button>
                    <button class="template-btn" data-template="mecha_battle">🤖 机甲对战</button>
                </div>
            </div>

            <div class="options-grid">
                <!-- 主体描述 -->
                <div class="option-group">
                    <label>🧑 主体描述 <span class="badge">必填</span></label>
                    <textarea id="subject" rows="2" placeholder="例如：一个穿红色风衣的银发机械姬 / 两个武士在竹林中对峙"></textarea>
                </div>

                <!-- 动作 (复选框) -->
                <div class="option-group">
                    <label>🏃 动作 (可多选)</label>
                    <div class="checkbox-group" id="actionGroup"></div>
                    <div class="custom-input">
                        <input type="text" id="actionCustom" placeholder="自定义动作 (例如：空中翻腾三周半)">
                    </div>
                </div>

                <!-- 情绪/微表情 -->
                <div class="option-group">
                    <label>😊 情绪/微表情</label>
                    <select id="emotion"></select>
                    <div class="custom-input">
                        <input type="text" id="emotionCustom" placeholder="自定义情绪 (例如：似笑非笑的诡异表情)">
                    </div>
                </div>

                <!-- 风格库 -->
                <div class="option-group">
                    <label>🎨 电影/动漫风格</label>
                    <select id="style"></select>
                    <div class="custom-input">
                        <input type="text" id="styleCustom" placeholder="自定义风格 (例如：蒸汽波美学)">
                    </div>
                </div>

                <!-- 特效库 -->
                <div class="option-group">
                    <label>✨ 特效类型</label>
                    <select id="effect"></select>
                    <div class="custom-input">
                        <input type="text" id="effectCustom" placeholder="自定义特效 (例如：全息投影效果)">
                    </div>
                </div>

                <!-- 物理属性 -->
                <div class="option-group">
                    <label>⚡ 物理/运动属性</label>
                    <select id="physics"></select>
                    <div class="custom-input">
                        <input type="text" id="physicsCustom" placeholder="自定义物理 (例如：子弹时间)">
                    </div>
                </div>

                <!-- 运镜方式 -->
                <div class="option-group">
                    <label>🎥 运镜方式</label>
                    <select id="camera"></select>
                    <div class="custom-input">
                        <input type="text" id="cameraCustom" placeholder="自定义运镜 (例如：穿越机第一视角)">
                    </div>
                </div>

                <!-- 光影氛围 -->
                <div class="option-group">
                    <label>☀️ 光影氛围</label>
                    <select id="lighting"></select>
                    <div class="custom-input">
                        <input type="text" id="lightingCustom" placeholder="自定义光影 (例如：极光反射)">
                    </div>
                </div>

                <!-- 与背景互动 -->
                <div class="option-group">
                    <label>🌳 与背景互动</label>
                    <select id="interaction"></select>
                    <div class="custom-input">
                        <input type="text" id="interactionCustom" placeholder="自定义互动 (例如：脚印在雪地上逐渐消失)">
                    </div>
                </div>

                <!-- 负面提示词 (多选) -->
                <div class="option-group">
                    <label>⚠️ 负面提示词 (可多选)</label>
                    <div class="checkbox-group" id="negativeGroup"></div>
                    <div class="custom-input">
                        <input type="text" id="negativeCustom" placeholder="自定义负面词 (例如：不对称的脸)">
                    </div>
                </div>
            </div>

            <!-- 预览区 (可编辑) -->
            <div class="preview-area">
                <textarea id="preview" placeholder="生成的提示词将显示在这里，您可以直接编辑..."></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-secondary" id="saveConfigBtn">💾 保存当前配置</button>
                <button class="btn btn-secondary" id="loadConfigBtn">📂 加载已保存</button>
                <button class="btn btn-secondary" id="clearBtn">🧹 清空选项</button>
                <button class="btn btn-primary" id="copyBtn">📋 复制提示词</button>
            </div>
        </div>

        <div class="footer">
            ⚡ 终极版 v4.0 · 每个选项均可自定义 · 无限可能
        </div>
    </div>

    <div class="toast" id="toast">✅ 已复制</div>

            // ---------- 初始化UI ----------
            function populateSelect(selectId, data, hasGroups = false) {
                const select = document.getElementById(selectId);
                select.innerHTML = '<option value="">-- 请选择 --</option>';
                if (hasGroups) {
                    const groups = {};
                    data.forEach(item => {
                        if (!groups[item.group]) groups[item.group] = [];
                        groups[item.group].push(item);
                    });
                    for (let group in groups) {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = group;
                        groups[group].forEach(item => {
                            const option = document.createElement('option');
                            option.value = item.value;
                            option.setAttribute('data-zh', item.zh);
                            option.setAttribute('data-en', item.en);
                            option.textContent = currentLang === 'zh' ? item.zh : item.en;
                            optgroup.appendChild(option);
                        });
                        select.appendChild(optgroup);
                    }
                } else {
                    data.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.value;
                        option.setAttribute('data-zh', item.zh);
                        option.setAttribute('data-en', item.en);
                        option.textContent = currentLang === 'zh' ? item.zh : item.en;
                        select.appendChild(option);
                    });
                }
            }

            function populateCheckbox(containerId, data, selectedValues = []) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                data.forEach(item => {
                    const label = document.createElement('label');
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.value = item.value;
                    checkbox.setAttribute('data-zh', item.zh);
                    checkbox.setAttribute('data-en', item.en);
                    if (selectedValues.includes(item.value)) checkbox.checked = true;
                    checkbox.addEventListener('change', () => {
                        updatePreview();
                        saveToLocalStorage();
                    });
                    label.appendChild(checkbox);
                    label.appendChild(document.createTextNode(currentLang === 'zh' ? item.zh : item.en));
                    container.appendChild(label);
                });
            }

            function initOptions() {
                populateCheckbox('actionGroup', optionData.action);
                populateSelect('emotion', optionData.emotion);
                populateSelect('style', optionData.style, true);
                populateSelect('effect', optionData.effect);
                populateSelect('physics', optionData.physics);
                populateSelect('camera', optionData.camera);
                populateSelect('lighting', optionData.lighting);
                populateSelect('interaction', optionData.interaction);
                populateCheckbox('negativeGroup', optionData.negative);
            }

            function updateAllLang() {
                // 更新复选框文本
                document.querySelectorAll('#actionGroup label').forEach(label => {
                    const checkbox = label.querySelector('input');
                    const value = checkbox.value;
                    const item = optionData.action.find(i => i.value === value);
                    if (item) {
                        label.childNodes[1].nodeValue = currentLang === 'zh' ? item.zh : item.en;
                    }
                });
                document.querySelectorAll('#negativeGroup label').forEach(label => {
                    const checkbox = label.querySelector('input');
                    const value = checkbox.value;
                    const item = optionData.negative.find(i => i.value === value);
                    if (item) {
                        label.childNodes[1].nodeValue = currentLang === 'zh' ? item.zh : item.en;
                    }
                });
                // 更新select
                ['emotion', 'style', 'effect', 'physics', 'camera', 'lighting', 'interaction'].forEach(id => {
                    const select = document.getElementById(id);
                    Array.from(select.options).forEach(option => {
                        if (option.value) {
                            const zh = option.getAttribute('data-zh');
                            const en = option.getAttribute('data-en');
                            option.textContent = currentLang === 'zh' ? zh : en;
                        }
                    });
                });
                // 主体占位符
                const subject = document.getElementById('subject');
                subject.placeholder = currentLang === 'zh' ? '例如：一个穿红色风衣的银发机械姬 / 两个武士在竹林中对峙' : 'e.g., a silver-haired cyborg in red trench coat / two warriors confronting';
            }

            // ---------- 获取选中值和自定义值 ----------
            function getSelectedCheckboxValues(containerId) {
                const checkboxes = document.querySelectorAll(`#${containerId} input:checked`);
                return Array.from(checkboxes).map(cb => cb.value);
            }

            function getSelectedText(selectElement) {
                const selectedOption = selectElement.options[selectElement.selectedIndex];
                if (!selectedOption || !selectedOption.value) return '';
                return currentLang === 'zh' ? selectedOption.getAttribute('data-zh') : selectedOption.getAttribute('data-en');
            }

            function getCustomValue(inputId) {
                const input = document.getElementById(inputId);
                return input ? input.value.trim() : '';
            }

            // 合并列表项和自定义
            function mergeWithCustom(selectedItems, customValue, lang = currentLang) {
                let texts = selectedItems.map(v => {
                    const item = optionData.action.find(i => i.value === v) || optionData.negative.find(i => i.value === v);
                    return item ? (lang === 'zh' ? item.zh : item.en) : '';
                }).filter(t => t);
                if (customValue) texts.push(customValue);
                return texts.join('，');
            }

            // 对于单一下拉，返回选中文本 + 自定义
            function getDropdownWithCustom(selectId, customId) {
                const select = document.getElementById(selectId);
                const selectedText = getSelectedText(select);
                const custom = getCustomValue(customId);
                if (selectedText && custom) return selectedText + '，' + custom;
                if (selectedText) return selectedText;
                if (custom) return custom;
                return '';
            }

            // ---------- 生成提示词 ----------
            function generatePrompt() {
                const subject = document.getElementById('subject').value.trim();

                // 动作
                const actionVals = getSelectedCheckboxValues('actionGroup');
                const actionCustom = getCustomValue('actionCustom');
                const actionText = mergeWithCustom(actionVals, actionCustom, currentLang);

                // 情绪
                const emotionText = getDropdownWithCustom('emotion', 'emotionCustom');
                
                // 风格
                const styleText = getDropdownWithCustom('style', 'styleCustom');

                // 特效
                const effectText = getDropdownWithCustom('effect', 'effectCustom');

                // 物理
                const physicsText = getDropdownWithCustom('physics', 'physicsCustom');

                // 运镜
                const cameraText = getDropdownWithCustom('camera', 'cameraCustom');

                // 光影
                const lightingText = getDropdownWithCustom('lighting', 'lightingCustom');

                // 互动
                const interactionText = getDropdownWithCustom('interaction', 'interactionCustom');

                // 负面
                const negativeVals = getSelectedCheckboxValues('negativeGroup');
                const negativeCustom = getCustomValue('negativeCustom');
                const negativeTexts = [];
                negativeVals.forEach(v => {
                    const item = optionData.negative.find(i => i.value === v);
                    if (item) negativeTexts.push(currentLang === 'zh' ? item.zh : item.en);
                });
                if (negativeCustom) negativeTexts.push(negativeCustom);
                const negativeJoined = negativeTexts.join('，');

                // 构建正向提示词
                let parts = [];
                if (subject) parts.push(subject);
                if (actionText) parts.push(actionText);
                if (emotionText) parts.push(emotionText);
                if (interactionText) parts.push(interactionText);
                if (cameraText) parts.push(cameraText);
                if (lightingText) parts.push(lightingText);
                if (styleText) parts.push(styleText);
                if (effectText) parts.push(effectText);
                if (physicsText) parts.push(physicsText);

                let prompt = parts.join('，');

                // 根据平台添加负面提示词
                if (negativeTexts.length) {
                    if (currentPlatform === 'midjourney') {
                        prompt += ' --no ' + negativeTexts.join(', ');
                    } else if (currentPlatform === 'stable diffusion') {
                        prompt += ' negative prompt: ' + negativeJoined;
                    } else {
                        prompt += '，避免' + negativeJoined;
                    }
                }

                return prompt || (currentLang === 'zh' ? '请至少填写主体描述' : 'Please fill in at least the subject');
            }

            function updatePreview() {
                const preview = document.getElementById('preview');
                preview.value = generatePrompt();

                const config = {
                    subject: document.getElementById('subject').value,
                    action: getSelectedCheckboxValues('actionGroup'),
                    actionCustom: getCustomValue('actionCustom'),
                    emotion: document.getElementById('emotion').value,
                    emotionCustom: getCustomValue('emotionCustom'),
                    style: document.getElementById('style').value,
                    styleCustom: getCustomValue('styleCustom'),
                    effect: document.getElementById('effect').value,
                    effectCustom: getCustomValue('effectCustom'),
                    physics: document.getElementById('physics').value,
                    physicsCustom: getCustomValue('physicsCustom'),
                    camera: document.getElementById('camera').value,
                    cameraCustom: getCustomValue('cameraCustom'),
                    lighting: document.getElementById('lighting').value,
                    lightingCustom: getCustomValue('lightingCustom'),
                    interaction: document.getElementById('interaction').value,
                    interactionCustom: getCustomValue('interactionCustom'),
                    negative: getSelectedCheckboxValues('negativeGroup'),
                    negativeCustom: getCustomValue('negativeCustom')
                };
                localStorage.setItem('promptBuilderConfig', JSON.stringify(config));
                showToast(currentLang === 'zh' ? '配置已保存' : 'Config saved');
            }

            function loadFromLocalStorage() {
                const saved = localStorage.getItem('promptBuilderConfig');
                if (!saved) {
                    showToast(currentLang === 'zh' ? '无保存的配置' : 'No saved config');
                    return;
                }
                try {
                    const config = JSON.parse(saved);
                    document.getElementById('subject').value = config.subject || '';
                    
                    document.querySelectorAll('#actionGroup input').forEach(cb => cb.checked = false);
                    if (config.action) {
                        config.action.forEach(val => {
                            const cb = document.querySelector(`#actionGroup input[value="${val}"]`);
                            if (cb) cb.checked = true;
                        });
                    }
                    document.getElementById('actionCustom').value = config.actionCustom || '';

                    document.getElementById('emotion').value = config.emotion || '';
                    document.getElementById('emotionCustom').value = config.emotionCustom || '';

                    document.getElementById('style').value = config.style || '';
                    document.getElementById('styleCustom').value = config.styleCustom || '';

                    document.getElementById('effect').value = config.effect || '';
                    document.getElementById('effectCustom').value = config.effectCustom || '';

                    document.getElementById('physics').value = config.physics || '';
                    document.getElementById('physicsCustom').value = config.physicsCustom || '';

                    document.getElementById('camera').value = config.camera || '';
                    document.getElementById('cameraCustom').value = config.cameraCustom || '';

                    document.getElementById('lighting').value = config.lighting || '';
                    document.getElementById('lightingCustom').value = config.lightingCustom || '';

                    document.getElementById('interaction').value = config.interaction || '';
                    document.getElementById('interactionCustom').value = config.interactionCustom || '';

                    document.querySelectorAll('#negativeGroup input').forEach(cb => cb.checked = false);
                    if (config.negative) {

                    document.getElementById('negativeCustom').value = config.negativeCustom || '';

            async function copyPrompt() {
                const text = document.getElementById('preview').value;
                if (!text || text.includes('请至少填写') || text.includes('Please fill')) {
                    alert(currentLang === 'zh' ? '请先生成有效的提示词' : 'Please generate a valid prompt first');
                    return;
                }
                try {
                    await navigator.clipboard.writeText(text);
                    showToast(currentLang === 'zh' ? '✅ 已复制到剪贴板' : '✅ Copied to clipboard');
                } catch {
                    alert(currentLang === 'zh' ? '复制失败，请手动复制' : 'Copy failed, please copy manually');
                }
            }

                const style = document.getElementById('style').value;
                if (!style) return;
                const recommendations = {
                    'cyberpunk': { effect: 'glow', lighting: 'neon' },
                    'sci-fi': { effect: 'glow', lighting: 'neon' },
                    'anime': { effect: 'particle', lighting: 'soft' },
                    'ghibli': { effect: 'particle', lighting: 'golden hour' },
                    'mecha': { effect: 'fire', lighting: 'high contrast' },
                    'noir': { lighting: 'moody' }
                };
                const rec = recommendations[style];
                if (rec) {
                    if (rec.effect && !document.getElementById('effect').value) {
                        document.getElementById('effect').value = rec.effect;
                    }
                    if (rec.lighting && !document.getElementById('lighting').value) {
                        document.getElementById('lighting').value = rec.lighting;
                    }
                }
            }

                    document.getElementById('camera').value = 'orbit';
                    document.getElementById('lighting').value = 'neon';
                    document.getElementById('interaction').value = 'rain';
                    document.querySelector('#negativeGroup input[value="blurry"]').checked = true;
                    document.querySelector('#negativeGroup input[value="distorted face"]').checked = true;
                }
                updatePreview();
            }

            loadInitial();
            bindEvents();
        })();
    </script>
</body>
</html>
