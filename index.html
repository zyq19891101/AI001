            padding: 20px;

            gap: 12px;

            border-radius: 30px;
            cursor: pointer;
            margin-left: 8px;
        }

            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

        }

            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #334155;
        }
        .option-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;

            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;

                    negative: ['distorted face']
                },
                historical_epic: {
                    subject: { zh: '千军万马在草原上冲锋', en: 'thousands of cavalry charging' },
                    action: ['run'],
                    emotion: 'determined',
                    style: 'cinematic',
                    effect: 'smoke',
                    physics: 'gravity',
                    camera: 'drone',
                    lighting: 'golden hour',
                    interaction: '',
                    position: 'wide',
                    negative: ['blurry']
                },
                mecha_battle: {
                    subject: { zh: '两个巨大机甲在城市中激战', en: 'two giant mechas fighting' },
                    action: ['fight', 'explode'],
                    emotion: 'angry',
                    style: 'mecha',
                    effect: 'fire',
                    physics: 'gravity',
                    camera: 'low angle',
                    lighting: 'high contrast',
                    interaction: 'ruins',
                    position: 'two-shot',
                    negative: ['distorted face', 'morphing']
                }
            };

            // ---------- 辅助函数 ----------
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // 创建镜头卡片（完整版）
            function createShotCard(shotId, shotData = {}) {
                const card = document.createElement('div');
                card.className = 'shot-card';
                card.dataset.shotId = shotId;

                // 头部
                const header = document.createElement('div');
                header.className = 'shot-header';
                header.innerHTML = `
                    <span class="shot-title">🎬 镜头 ${shotId}</span>
                    <div class="shot-actions">
                        <button class="copy-shot-btn">📋 复制</button>
                        <button class="delete-shot-btn">🗑️ 删除</button>
                    </div>
                `;
                card.appendChild(header);

                // 主体
                const subjectGroup = document.createElement('div');
                subjectGroup.className = 'option-group';
                subjectGroup.innerHTML = `<label>🧑 主体描述</label><textarea class="shot-subject" rows="2">${shotData.subject || ''}</textarea>`;
                card.appendChild(subjectGroup);

                // 动作
                const actionGroup = document.createElement('div');
                actionGroup.className = 'option-group';
                actionGroup.innerHTML = `<label>🏃 动作</label><div class="checkbox-group shot-action-group"></div><div class="custom-input"><input type="text" class="shot-action-custom" value="${shotData.actionCustom || ''}" placeholder="自定义动作"></div>`;
                card.appendChild(actionGroup);
                const actionContainer = actionGroup.querySelector('.checkbox-group');
                optionData.action.forEach(item => {
                    const label = document.createElement('label');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.className = 'shot-action-cb';
                    cb.value = item.value;
                    if (shotData.action && shotData.action.includes(item.value)) cb.checked = true;
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(currentLang === 'zh' ? item.zh : item.en));
                    actionContainer.appendChild(label);
                });

                // 情绪
                const emotionGroup = document.createElement('div');
                emotionGroup.className = 'option-group';
                emotionGroup.innerHTML = `<label>😊 情绪</label><select class="shot-emotion"><option value="">-- 请选择 --</option></select><div class="custom-input"><input type="text" class="shot-emotion-custom" value="${shotData.emotionCustom || ''}" placeholder="自定义情绪"></div>`;
                card.appendChild(emotionGroup);
                const emotionSelect = emotionGroup.querySelector('.shot-emotion');
                optionData.emotion.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.emotion) opt.selected = true;
                    emotionSelect.appendChild(opt);
                });

                // 风格
                const styleGroup = document.createElement('div');
                styleGroup.className = 'option-group';
                styleGroup.innerHTML = `<label>🎨 风格</label><select class="shot-style"><option value="">-- 请选择 --</option></select><div class="custom-input"><input type="text" class="shot-style-custom" value="${shotData.styleCustom || ''}" placeholder="自定义风格"></div>`;
                card.appendChild(styleGroup);
                const styleSelect = styleGroup.querySelector('.shot-style');
                optionData.style.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.style) opt.selected = true;
                    styleSelect.appendChild(opt);
                });

                // 特效
                const effectGroup = document.createElement('div');
                effectGroup.className = 'option-group';
                effectGroup.innerHTML = `<label>✨ 特效</label><select class="shot-effect"><option value="">-- 请选择 --</option></select><div class="custom-input"><input type="text" class="shot-effect-custom" value="${shotData.effectCustom || ''}" placeholder="自定义特效"></div>`;
                card.appendChild(effectGroup);
                const effectSelect = effectGroup.querySelector('.shot-effect');
                optionData.effect.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.effect) opt.selected = true;
                    effectSelect.appendChild(opt);
                });

                // 物理
                const physicsGroup = document.createElement('div');
                physicsGroup.className = 'option-group';
                physicsGroup.innerHTML = `<label>⚡ 物理</label><select class="shot-physics"><option value="">-- 请选择 --</option></select><div class="custom-input"><input type="text" class="shot-physics-custom" value="${shotData.physicsCustom || ''}" placeholder="自定义物理"></div>`;
                card.appendChild(physicsGroup);
                const physicsSelect = physicsGroup.querySelector('.shot-physics');
                optionData.physics.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.physics) opt.selected = true;
                    physicsSelect.appendChild(opt);
                });

                // 运镜
                const cameraGroup = document.createElement('div');
                cameraGroup.className = 'option-group';
                cameraGroup.innerHTML = `<label>🎥 运镜</label><select class="shot-camera"><option value="">-- 请选择 --</option></select><div class="custom-input"><input type="text" class="shot-camera-custom" value="${shotData.cameraCustom || ''}" placeholder="自定义运镜"></div>`;
                card.appendChild(cameraGroup);
                const cameraSelect = cameraGroup.querySelector('.shot-camera');
                optionData.camera.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.camera) opt.selected = true;
                    cameraSelect.appendChild(opt);
                });

                // 光影
                const lightingGroup = document.createElement('div');
                lightingGroup.className = 'option-group';
                lightingGroup.innerHTML = `<label>☀️ 光影</label><select class="shot-lighting"><option value="">-- 请选择 --</option></select><div class="custom-input"><input type="text" class="shot-lighting-custom" value="${shotData.lightingCustom || ''}" placeholder="自定义光影"></div>`;
                card.appendChild(lightingGroup);
                const lightingSelect = lightingGroup.querySelector('.shot-lighting');
                optionData.lighting.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.lighting) opt.selected = true;
                    lightingSelect.appendChild(opt);
                });

                // 互动
                const interactionGroup = document.createElement('div');
                interactionGroup.className = 'option-group';
                interactionGroup.innerHTML = `<label>🌳 互动</label><select class="shot-interaction"><option value="">-- 请选择 --</option></select><div class="custom-input"><input type="text" class="shot-interaction-custom" value="${shotData.interactionCustom || ''}" placeholder="自定义互动"></div>`;
                card.appendChild(interactionGroup);
                const interactionSelect = interactionGroup.querySelector('.shot-interaction');
                optionData.interaction.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.interaction) opt.selected = true;
                    interactionSelect.appendChild(opt);
                });

                // 站位
                const positionGroup = document.createElement('div');
                positionGroup.className = 'option-group';
                positionGroup.innerHTML = `<label>📐 人物站位</label><select class="shot-position"><option value="">-- 请选择 --</option></select><div class="custom-input"><input type="text" class="shot-position-custom" value="${shotData.positionCustom || ''}" placeholder="自定义站位"></div>`;
                card.appendChild(positionGroup);
                const positionSelect = positionGroup.querySelector('.shot-position');
                optionData.position.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.setAttribute('data-zh', item.zh);
                    opt.setAttribute('data-en', item.en);
                    opt.textContent = currentLang === 'zh' ? item.zh : item.en;
                    if (item.value === shotData.position) opt.selected = true;
                    positionSelect.appendChild(opt);
                });

                // 负面词
                const negativeGroup = document.createElement('div');
                negativeGroup.className = 'option-group';
                negativeGroup.innerHTML = `<label>⚠️ 负面词</label><div class="checkbox-group shot-negative-group"></div><div class="custom-input"><input type="text" class="shot-negative-custom" value="${shotData.negativeCustom || ''}" placeholder="自定义负面词"></div>`;
                card.appendChild(negativeGroup);
                const negativeContainer = negativeGroup.querySelector('.checkbox-group');
                optionData.negative.forEach(item => {
                    const label = document.createElement('label');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.className = 'shot-negative-cb';
                    cb.value = item.value;
                    if (shotData.negative && shotData.negative.includes(item.value)) cb.checked = true;
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(currentLang === 'zh' ? item.zh : item.en));
                    negativeContainer.appendChild(label);
                });

                return card;
            }

            // 收集镜头数据
            function collectShotData(card) {
                return {
                    subject: card.querySelector('.shot-subject').value,
                    action: Array.from(card.querySelectorAll('.shot-action-cb:checked')).map(cb => cb.value),
                    actionCustom: card.querySelector('.shot-action-custom').value,
                    emotion: card.querySelector('.shot-emotion').value,
                    emotionCustom: card.querySelector('.shot-emotion-custom').value,
                    style: card.querySelector('.shot-style').value,
                    styleCustom: card.querySelector('.shot-style-custom').value,
                    effect: card.querySelector('.shot-effect').value,
                    effectCustom: card.querySelector('.shot-effect-custom').value,
                    physics: card.querySelector('.shot-physics').value,
                    physicsCustom: card.querySelector('.shot-physics-custom').value,
                    camera: card.querySelector('.shot-camera').value,
                    cameraCustom: card.querySelector('.shot-camera-custom').value,
                    lighting: card.querySelector('.shot-lighting').value,
                    lightingCustom: card.querySelector('.shot-lighting-custom').value,
                    interaction: card.querySelector('.shot-interaction').value,
                    interactionCustom: card.querySelector('.shot-interaction-custom').value,
                    position: card.querySelector('.shot-position').value,
                    positionCustom: card.querySelector('.shot-position-custom').value,
                    negative: Array.from(card.querySelectorAll('.shot-negative-cb:checked')).map(cb => cb.value),
                    negativeCustom: card.querySelector('.shot-negative-custom').value
                };
            }

            // 生成单个镜头提示词
            function generateShotPrompt(shotData) {
                const parts = [];
                if (shotData.subject) parts.push(shotData.subject);

                // 动作
                const actionTexts = shotData.action.map(v => {
                    const item = optionData.action.find(i => i.value === v);
                    return item ? (currentLang === 'zh' ? item.zh : item.en) : '';
                }).filter(t => t);
                if (shotData.actionCustom) actionTexts.push(shotData.actionCustom);
                if (actionTexts.length) parts.push(actionTexts.join('，'));

                // 情绪
                const emotionItem = optionData.emotion.find(i => i.value === shotData.emotion);
                if (emotionItem) parts.push(currentLang === 'zh' ? emotionItem.zh : emotionItem.en);
                if (shotData.emotionCustom) parts.push(shotData.emotionCustom);

                // 互动
                const interactionItem = optionData.interaction.find(i => i.value === shotData.interaction);
                if (interactionItem) parts.push(currentLang === 'zh' ? interactionItem.zh : interactionItem.en);
                if (shotData.interactionCustom) parts.push(shotData.interactionCustom);

                // 站位
                const positionItem = optionData.position.find(i => i.value === shotData.position);
                if (positionItem) parts.push(currentLang === 'zh' ? positionItem.zh : positionItem.en);
                if (shotData.positionCustom) parts.push(shotData.positionCustom);

                // 运镜
                const cameraItem = optionData.camera.find(i => i.value === shotData.camera);
                if (cameraItem) parts.push(currentLang === 'zh' ? cameraItem.zh : cameraItem.en);
                if (shotData.cameraCustom) parts.push(shotData.cameraCustom);

                // 光影
                const lightingItem = optionData.lighting.find(i => i.value === shotData.lighting);
                if (lightingItem) parts.push(currentLang === 'zh' ? lightingItem.zh : lightingItem.en);
                if (shotData.lightingCustom) parts.push(shotData.lightingCustom);

                // 风格
                const styleItem = optionData.style.find(i => i.value === shotData.style);
                if (styleItem) parts.push(currentLang === 'zh' ? styleItem.zh : styleItem.en);
                if (shotData.styleCustom) parts.push(shotData.styleCustom);

                // 特效
                const effectItem = optionData.effect.find(i => i.value === shotData.effect);
                if (effectItem) parts.push(currentLang === 'zh' ? effectItem.zh : effectItem.en);
                if (shotData.effectCustom) parts.push(shotData.effectCustom);

                // 物理
                const physicsItem = optionData.physics.find(i => i.value === shotData.physics);
                if (physicsItem) parts.push(currentLang === 'zh' ? physicsItem.zh : physicsItem.en);
                if (shotData.physicsCustom) parts.push(shotData.physicsCustom);

                let prompt = parts.join('，');

                // 负面
                const negativeTexts = [];
                shotData.negative.forEach(v => {
                    const item = optionData.negative.find(i => i.value === v);
                    if (item) negativeTexts.push(currentLang === 'zh' ? item.zh : item.en);
                });
                if (shotData.negativeCustom) negativeTexts.push(shotData.negativeCustom);
                if (negativeTexts.length) {
                    if (currentPlatform === 'midjourney') {
                        prompt += ' --no ' + negativeTexts.join(', ');
                    } else if (currentPlatform === 'stable diffusion') {
                        prompt += ' negative prompt: ' + negativeTexts.join('，');
                    } else {
                        prompt += '，避免' + negativeTexts.join('，');
                    }
                }

                return prompt;
            }

            // 更新总预览
            function updatePreview() {
                const shots = collectAllShots();
                if (shots.length === 0) {
                    previewTextarea.value = '';
                    return;
                }
                const shotPrompts = shots.map((shot, index) => `【镜头 ${index+1}】${generateShotPrompt(shot)}`);
                previewTextarea.value = shotPrompts.join('\n\n');
            }

            function collectAllShots() {
                return Array.from(document.querySelectorAll('.shot-card')).map(card => collectShotData(card));
            }

            // 绑定镜头事件
            function bindShotEvents(card) {
                card.querySelectorAll('input, select, textarea').forEach(el => {
                    el.addEventListener('input', () => { updatePreview(); saveToLocalStorage(); });
                    el.addEventListener('change', () => { updatePreview(); saveToLocalStorage(); });
                });

                card.querySelector('.copy-shot-btn').addEventListener('click', () => {
                    const data = collectShotData(card);
                    const newId = ++shotCounter;
                    const newCard = createShotCard(newId, data);
                    shotsContainer.appendChild(newCard);
                    bindShotEvents(newCard);
                    updatePreview();
                    saveToLocalStorage();
                });

                card.querySelector('.delete-shot-btn').addEventListener('click', () => {
                    if (document.querySelectorAll('.shot-card').length <= 1) {
                        alert('至少保留一个镜头');
                        return;
                    }
                    card.remove();
                    updatePreview();
                    saveToLocalStorage();
                });
            }

            // 保存配置
            function saveToLocalStorage() {
                const shots = collectAllShots();
                localStorage.setItem('multiShotFull', JSON.stringify(shots));
                showToast('配置已保存');
            }

            // 加载配置
            function loadFromLocalStorage() {
                const saved = localStorage.getItem('multiShotFull');
                if (!saved) { showToast('无保存配置'); return; }
                try {
                    const shots = JSON.parse(saved);
                    shotsContainer.innerHTML = '';
                    shotCounter = 0;
                    shots.forEach(data => {
                        const newId = ++shotCounter;
                        const card = createShotCard(newId, data);
                        shotsContainer.appendChild(card);
                        bindShotEvents(card);
                    });
                    updatePreview();
                    showToast('配置已加载');
                } catch { showToast('加载失败'); }
            }

            // 清空所有
            function clearAll() {
                shotsContainer.innerHTML = '';
                shotCounter = 0;
                const newId = ++shotCounter;
                const card = createShotCard(newId, {});
                shotsContainer.appendChild(card);
                bindShotEvents(card);
                updatePreview();
                saveToLocalStorage();
            }

            // 语言切换
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLang = btn.dataset.lang;
                    // 简单刷新（实际可优化，为省事用重载）
                    location.reload();
                });
            });

            // 平台切换
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentPlatform = btn.dataset.platform;
                    updatePreview();
                });
            });

            // 模板按钮
            document.querySelectorAll('.template-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tmpl = templates[btn.dataset.template];
                    if (!tmpl) return;
                    // 清空并新建一个镜头
                    shotsContainer.innerHTML = '';
                    shotCounter = 0;
                    const newId = ++shotCounter;
                    const card = createShotCard(newId, {
                        subject: currentLang === 'zh' ? tmpl.subject.zh : tmpl.subject.en,
                        action: tmpl.action,
                        emotion: tmpl.emotion,
                        style: tmpl.style,
                        effect: tmpl.effect,
                        physics: tmpl.physics,
                        camera: tmpl.camera,
                        lighting: tmpl.lighting,
                        interaction: tmpl.interaction,
                        position: tmpl.position,
                        negative: tmpl.negative
                    });
                    shotsContainer.appendChild(card);
                    bindShotEvents(card);
                    updatePreview();
                    saveToLocalStorage();
                });
            });

            // 添加镜头
            document.getElementById('addShotBtn').addEventListener('click', () => {
                const newId = ++shotCounter;
                const card = createShotCard(newId, {});
                shotsContainer.appendChild(card);
                bindShotEvents(card);
                updatePreview();
                saveToLocalStorage();
            });

            // 保存/加载/清空/复制按钮
            document.getElementById('saveConfigBtn').addEventListener('click', saveToLocalStorage);
            document.getElementById('loadConfigBtn').addEventListener('click', loadFromLocalStorage);
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('copyBtn').addEventListener('click', async () => {
                const text = previewTextarea.value;
                if (!text.trim()) { alert('无内容可复制'); return; }
                await navigator.clipboard.writeText(text);
                showToast('✅ 已复制');
            });

            // 初始化
            (function init() {
                const newId = ++shotCounter;
                const card = createShotCard(newId, {});
                shotsContainer.appendChild(card);
                bindShotEvents(card);
                updatePreview();
            })();
        })();
    </script>
</body>
</html>
